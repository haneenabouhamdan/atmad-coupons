name: Sync coupons from Google Sheet

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull sheet into coupons-data.js
        run: node scripts/sync-coupons-from-sheet.mjs

      - name: Commit and push if changed
        run: |
          git add coupons-data.js coupons-ar.js sitemap.xml
          if git diff --staged --quiet; then
            echo "No coupon changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync coupons from Google Sheet."
          git push
